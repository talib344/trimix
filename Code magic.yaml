workflows:
  android-only:
    name: Android Build
    max_build_duration: 60
    instance_type: linux
    environment:
      flutter: 3.22.0
    scripts:
      - name: Set up
        script: |
          flutter pub get
          flutter pub add ffmpeg_kit_flutter:5.1.0
      - name: Build APK
        script: |
          flutter build apk --release --split-per-abi
    artifacts:
      - build/app/outputs/flutter-apk/app-release.apk
    publishing:
      email:
        recipients:
          - talibsindhi344@gmail.com
